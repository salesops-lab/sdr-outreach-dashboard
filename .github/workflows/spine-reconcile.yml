name: Spine nightly reconcile
on:
  schedule:
    - cron: "30 6 * * *"
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: spine-reconcile
  cancel-in-progress: false
jobs:
  reconcile:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }  # 22+: supabase-js needs a global WebSocket (absent on Node 20)
      - run: npm ci
      - run: npm run sync:reconcile
        env:
          HUBSPOT_PAT: ${{ secrets.HUBSPOT_PAT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Nightly content refresh (call notes / AI summaries / transcripts, last 90d) — the fuel
      # for briefs + semantic recall. Kept OFF the 15-min delta path by design.
      - run: npm run content:backfill
        env:
          HUBSPOT_PAT: ${{ secrets.HUBSPOT_PAT }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      # Index new content into sdr_embeddings (pgvector) — idempotent, new rows only.
      - run: npm run embed:content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
